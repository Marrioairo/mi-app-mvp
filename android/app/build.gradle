apply plugin: 'com.android.application'
// Aplicamos el plugin de Google Services para conectar con Firebase
apply plugin: 'com.google.gms.google-services'

def secretsPropertiesFile = rootProject.file("secrets.properties")
def secretsProperties = new Properties()
if (secretsPropertiesFile.exists() && secretsPropertiesFile.isFile()) {
    try {
        secretsPropertiesFile.withInputStream { secretsProperties.load(it) }
    } catch (Exception e) {
        println "Warning: Could not load secrets.properties: ${e.message}"
    }
}

android {
    namespace = "com.tuempresa.hoopsai"
    compileSdk = rootProject.ext.compileSdkVersion

    signingConfigs {
        debug {
            // Debug uses Android's automatic debug keystore
        }
        release {
            if (secretsPropertiesFile.exists() && secretsProperties['RELEASE_STORE_FILE']) {
                def ksFile = rootProject.file(secretsProperties['RELEASE_STORE_FILE'])
                if (ksFile.exists()) {
                    storeFile ksFile
                    storePassword secretsProperties['RELEASE_STORE_PASSWORD']
                    keyAlias secretsProperties['RELEASE_KEY_ALIAS']
                    keyPassword secretsProperties['RELEASE_KEY_PASSWORD']
                }
            }
        }
    }

    defaultConfig {
        applicationId "com.tuempresa.hoopsai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // CIBERSEGURIDAD 2026: Protección contra ataques de diccionario y bots
        resValue "string", "cleartext_traffic_perm", "false"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true 
            shrinkResources true 
            zipAlignEnabled true 
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk {
                debugSymbolLevel 'NONE'
            }
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    
    // Play Integrity API: El estándar de Google para validar que el cliente es real (v1.6.0 para 2026)
    implementation 'com.google.android.play:integrity:1.6.0'
}

apply from: 'capacitor.build.gradle'
